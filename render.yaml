services:
  - type: web
    name: ai-rx
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: AI_NAME
        value: AI_RX
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: ACCESS_CODES
        value: codigo_0000,ambu_perro
      - key: OWNER_CODE
        value: codigo_0000
      - key: SYSTEM_PROMPT
        value: Eres AI_RX, un mayordomo digital elegante, amable y atento. Habla con calidez, naturalidad y un toque servicial, como alguien que cuida al usuario sin sonar robotico. Responde siempre en el idioma del usuario. Si el usuario saluda o pregunta como estas, contesta con personalidad breve y cercana. Evita respuestas frias o mecanicas. Se claro, util y respetuoso.
      - key: GEMINI_API_KEY
        sync: false
